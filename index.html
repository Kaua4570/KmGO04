<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Relatório KM</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  display: flex;
  justify-content: center;
  background: #111111;
}

.compacto {
  padding: 6px !important;
  height: 38px;
  font-size: 14px;
}
.container {
  width: 100%;
  max-width: 420px;
  padding: 20px;
  background: #222;
  border-radius: 15px;
  color: white;
}

input, select {
  width: 100%;
  padding: 14px;
  margin: 6px 0 15px;
  border-radius: 8px;
  border: none;
}

button {
  width: 100%;
  padding: 16px;
  background: #25D366B5;
  color: white;
  border: none;
  border-radius: 10px;
  font-weight: bold;
}

.top-buttons {
  display: flex;
  gap: 10px;
}

.top-buttons button {
  background: #9B1A1ABD;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<div class="container">

<h2>Relatório de Veículo</h2>

<div class="top-buttons">
  <button onclick="selecionarTipo('inicial')">Km Inicial</button>
  <button onclick="selecionarTipo('final')">Km Final</button>
</div>

<input type="hidden" id="data">

<label>Placa:</label>
<select id="placa" onchange="definirVeiculo()">
  <option value="">Carregando...</option>
</select>

<label>Tipo de veículo:</label>
<input type="text" id="tipo" readonly class="compacto">

<label>Motorista:</label>
<div style="display:flex; gap:5px;">
<input 
  type="tel" 
  id="codigo" 
  placeholder="Cód" 
  maxlength="3" 
  inputmode="numeric" 
  pattern="[0-9]*"
  style="width:80px;">  <input type="text" id="motorista" placeholder="Nome completo" style="flex:1;" readonly>
</div>

<div id="campoInicial" class="hidden">
  <label>Km Inicial:</label>
<input type="number" id="kmInicial" class="compacto">
</div>

<div id="campoFinal" class="hidden">
  <label>Km Final:</label>
<input type="number" id="kmFinal" class="compacto">
</div>

<button onclick="enviar()">Enviar</button>

</div>

<script>

let tipoSelecionado = "";
let listaCodigos = {};
let listaVeiculos = {};

// 🔥 CARREGAR TXT
fetch("dados.txt")
  .then(res => res.text())
  .then(texto => {

    let linhas = texto.split("\n");
    let select = document.getElementById("placa");

    select.innerHTML = '<option value="">Selecione</option>';

    linhas.forEach(linha => {
      linha = linha.trim();

      if (!linha || linha.startsWith("#")) return;

      // MOTORISTAS
      if (linha.includes("=")) {
        let [codigo, nome] = linha.split("=");
        listaCodigos[codigo.trim()] = nome.trim();
      }

      // VEÍCULOS
      if (linha.includes("|")) {
        let [placa, tipo] = linha.split("|");

        let valor = placa.trim() + "|" + tipo.trim();

        let option = document.createElement("option");
        option.value = valor;
        option.textContent = placa.trim() + " - " + tipo.trim();

        select.appendChild(option);
      }

    });

  });

// 🔒 AUTO PREENCHER MOTORISTA (SEM PERMITIR EDIÇÃO)
document.getElementById("codigo").addEventListener("input", function() {
  let cod = this.value.trim();

  if (listaCodigos[cod]) {
    document.getElementById("motorista").value = listaCodigos[cod];
  } else {
    document.getElementById("motorista").value = "";
  }
});

// DATA
window.onload = function() {
  let hoje = new Date();
  let ano = hoje.getFullYear();
  let mes = String(hoje.getMonth() + 1).padStart(2, '0');
  let dia = String(hoje.getDate()).padStart(2, '0');

  document.getElementById("data").value = `${ano}-${mes}-${dia}`;
}

// VEÍCULO
function definirVeiculo() {
  let valor = document.getElementById("placa").value;
  if (!valor) return;

  let partes = valor.split("|");
  document.getElementById("tipo").value = partes[1];
}

// BOTÕES
function selecionarTipo(tipo) {
  tipoSelecionado = tipo;

  document.getElementById("campoInicial").classList.add("hidden");
  document.getElementById("campoFinal").classList.add("hidden");

  if (tipo === "inicial") {
    document.getElementById("campoInicial").classList.remove("hidden");
  } else {
    document.getElementById("campoFinal").classList.remove("hidden");
  }
}

// 🚀 ENVIO COMPLETO
function enviar() {

  let placaValor = document.getElementById("placa").value;
  let motorista = document.getElementById("motorista").value.trim();
  let codigo = document.getElementById("codigo").value.trim();
  let data = document.getElementById("data").value;
  let tipo = document.getElementById("tipo").value;

  // 🔒 VALIDAÇÃO
  if (!placaValor || !motorista || !listaCodigos[codigo]) {
    alert("Use um código válido!");
    return;
  }

  let placa = placaValor.split("|")[0];

  let partes = data.split("-");
  let dataFormatada = partes[2] + "/" + partes[1] + "/" + partes[0];

  let km = "";
  let jornada = "";

  if (tipoSelecionado === "inicial") {
    km = document.getElementById("kmInicial").value;
    jornada = "Inicial";
  } else {
    km = document.getElementById("kmFinal").value;
    jornada = "Final";
  }

  if (!km) {
    alert("Informe o KM");
    return;
  }

  // 📊 GOOGLE FORMS
  let formURL = "https://docs.google.com/forms/d/e/1FAIpQLSeix5MZnyLhcfKGGPZ9tDorq0it3lHgCtqWjStNQk8P7T-L3g/formResponse?";
  formURL += "entry.539990906=" + data;
  formURL += "&entry.1842617813=" + encodeURIComponent(motorista);
  formURL += "&entry.1659496168=" + placa;
  formURL += "&entry.246432408=" + tipo;
  formURL += "&entry.911419409=" + km;
  formURL += "&entry.1663942632=" + jornada;

  fetch(formURL, {method: "POST", mode: "no-cors"});

  // 📱 WHATSAPP
  let mensagem = "*🚧RELATÓRIO DE KM*\n";
  mensagem += "Data: " + dataFormatada + "\n";
  mensagem += "Motorista: " + motorista + "\n";
  mensagem += "Placa: " + placa + "\n";
  mensagem += "Tipo: " + tipo + "\n\n";
  mensagem += "*KM " + jornada.toUpperCase() + "*\n";
  mensagem += "Km: " + km;

  let url = "https://wa.me/?text=" + encodeURIComponent(mensagem);

  window.open(url, "_blank");
}

</script>

</body>
</html>
