<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Relatório KM</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0b0b;
  color: white;
}

/* TOPO COM IMAGEM */
.topo {
  height: 260px;
  background: url('fundo.jpg') center/cover no-repeat;
  position: relative;
}

/* ESCURECER A IMAGEM */
.topo::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.6);
}

/* CARD PRINCIPAL */
.container {
  margin: -80px 20px 20px;
  padding: 20px;
  border-radius: 20px;
  background: rgba(20,20,20,0.95);
  box-shadow: 0 0 25px rgba(255,0,60,0.2);
}

/* TÍTULO */
h1 {
  text-align: center;
  margin-bottom: 20px;
}

/* CAMPOS */
input, select {
  width: 100%;
  padding: 15px;
  margin-top: 8px;
  margin-bottom: 15px;
  border-radius: 12px;
  border: 1px solid #333;
  background: #0f0f0f;
  color: white;
  font-size: 14px;
}

/* DOIS CAMPOS LADO A LADO */
.row {
  display: flex;
  gap: 10px;
}

.row input {
  flex: 1;
}

/* BOTÃO */
button {
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 15px;
  background: linear-gradient(90deg, #ff003c, #ff1a4d);
  color: white;
  font-size: 18px;
  font-weight: bold;
  box-shadow: 0 0 15px rgba(255,0,60,0.6);
}
</style>

</head>

<body>

<!-- TOPO COM IMAGEM -->
<div class="topo"></div>

<!-- FORMULÁRIO -->
<div class="container">

<h1>Relatório de Veículo</h1>

<div class="row">
  <input type="number" placeholder="Km Inicial">
  <input type="number" placeholder="Km Final">
</div>

<label>Placa:</label>
<select>
  <option>Selecione</option>
</select>

<label>Tipo de veículo:</label>
<input type="text">

<label>Motorista:</label>
<div class="row">
  <input type="text" placeholder="Cód">
  <input type="text" placeholder="Nome completo">
</div>

<label>Km Inicial:</label>
<input type="number">

<button>Enviar</button>

</div>

</body>
</html>
