<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel ADM</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#121212">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  margin: 0;
  color: white;
  display: flex;
  justify-content: center;

  /* 🔥 FUNDO */
  background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)),
              url("fundo.png");
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}

.container {
  width: 100%;
  max-width: 420px;
  padding: 20px;
}

h1 {
  text-align: center;
}

select {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  margin-bottom: 15px;
  border: none;
}

.card {
  background: rgba(0,0,0,0.75);
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
  backdrop-filter: blur(5px);
}

ul {
  padding-left: 20px;
}

canvas {
  background: transparent;
}
</style>
</head>

<body>

<div class="container">

<h1>Painel ADM</h1>

<select id="placaSelect" onchange="selecionarPlaca()">
  <option value="">Selecione a placa</option>
</select>

<div class="card">
  <p><b>Último motorista:</b> <span id="motorista">-</span></p>
  <p><b>KM atual:</b> <span id="km">-</span></p>
  <p><b>Jornada:</b> <span id="jornada">-</span></p>
  <p><b>Veículo:</b> <span id="veiculo">-</span></p>
</div>

<div class="card">
  <h3>Histórico:</h3>
  <ul id="historico"></ul>
</div>

<div class="card">
  <h3>Gráfico de KM</h3>
  <canvas id="graficoKm"></canvas>
</div>

</div>

<script src="script.js"></script>

<!-- 🔥 SERVICE WORKER -->
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js")
    .then(() => console.log("App pronto"))
    .catch(err => console.log(err));
}
</script>

</body>
</html>
