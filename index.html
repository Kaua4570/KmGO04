<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Relatório KM</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;

  /* FUNDO IGUAL MOCKUP */
  background: url('fundo.jpg') no-repeat center center fixed;
  background-size: cover;
}

/* ESCURECER FUNDO */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(2px);
}

/* LOGO TOPO */
.topo {
  text-align: center;
  padding-top: 60px;
  position: relative;
  z-index: 2;
}

.topo img {
  width: 140px;
}

/* CARD */
.container {
  width: 90%;
  max-width: 400px;
  margin: 20px auto;
  padding: 20px;
  border-radius: 20px;

  /* GLASS EFFECT */
  background: rgba(20,20,20,0.6);
  backdrop-filter: blur(15px);

  border: 1px solid rgba(255,255,255,0.08);
  box-shadow:
    0 0 20px rgba(255,0,60,0.15),
    inset 0 0 20px rgba(255,255,255,0.03);

  position: relative;
  z-index: 2;
}

/* TÍTULO */
h2 {
  text-align: center;
  margin-bottom: 15px;
}

/* BOTÕES */
.top-buttons {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}

.top-buttons button {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #111;
  color: #aaa;
}

.top-buttons button.active {
  background: linear-gradient(135deg, #ff003c, #ff4d6d);
  color: white;
  box-shadow: 0 0 10px #ff003caa;
}

/* INPUTS */
input, select {
  width: 100%;
  padding: 14px;
  margin: 6px 0 15px;
  border-radius: 12px;
  border: 1px solid #333;
  background: rgba(0,0,0,0.6);
  color: white;
}

/* FOCO */
input:focus, select:focus {
  border: 1px solid #ff003c;
  box-shadow: 0 0 10px #ff003c88;
}

/* MOTORISTA */
.linha {
  display: flex;
  gap: 8px;
}

.linha input:first-child {
  width: 80px;
}

/* BOTÃO */
.enviar {
  width: 100%;
  padding: 16px;
  border-radius: 12px;
  border: none;

  background: linear-gradient(135deg, #ff003c, #b3002a);
  color: white;
  font-weight: bold;
  font-size: 16px;

  box-shadow:
    0 0 20px #ff003caa,
    0 5px 20px rgba(0,0,0,0.5);
}

/* ESCONDIDO */
.hidden {
  display: none;
}
</style>
</head>

<body>

<div class="topo">
  <img src="logo.png">
</div>

<div class="container">

<h2>Relatório de Veículo</h2>

<div class="top-buttons">
  <button onclick="selecionarTipo('inicial')">Km Inicial</button>
  <button onclick="selecionarTipo('final')">Km Final</button>
</div>

<label>Placa:</label>
<select>
  <option>Selecione</option>
</select>

<label>Tipo de veículo:</label>
<input type="text">

<label>Motorista:</label>
<div class="linha">
  <input placeholder="Cód">
  <input placeholder="Nome completo">
</div>

<div id="campoInicial">
  <label>Km Inicial:</label>
  <input type="number">
</div>

<button class="enviar">Enviar</button>

</div>

<script>
function selecionarTipo(tipo){
  document.querySelectorAll(".top-buttons button").forEach(b=>b.classList.remove("active"))
  if(tipo==="inicial"){
    document.querySelectorAll(".top-buttons button")[0].classList.add("active")
  }else{
    document.querySelectorAll(".top-buttons button")[1].classList.add("active")
  }
}
</script>

</body>
</html>
