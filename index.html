<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Relatório KM</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#b00d02">

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  background: url('fundo.jpg') no-repeat center;
  background-size: cover;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
}

.topo { height: 60px; }

.container {
  width: 90%;
  max-width: 400px;
  margin: 20px auto;
  padding: 25px 10px;
  border-radius: 20px;
  background: rgba(20,20,20,0.6);
  backdrop-filter: blur(15px);
  border: 1px solid rgba(255,255,255,0.08);
}

h2 { text-align: center; }

.top-buttons {
  display: flex;
  gap: 10px;
}

.top-buttons button {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #111;
  color: #aaa;
}

.top-buttons button.active {
  background: linear-gradient(135deg, #ff003c, #ff4d6d);
  color: white;
}

input, select {
  width: 92%;
  padding: 14px;
  margin: 8px auto;
  border-radius: 12px;
  border: 1px solid #333;
  background: rgba(0,0,0,0.6);
  color: white;
  display: block;
}

.linha {
  display: flex;
  gap: 8px;
  width: 92%;
  margin: auto;
}

.linha input:first-child { width: 80px; }

button.enviar {
  width: 92%;
  padding: 16px;
  margin: auto;
  display: block;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #ff003c, #b3002a);
  color: white;
  font-weight: bold;
}

.hidden { display: none; }
</style>
</head>

<body>

<div class="topo"></div>

<div class="container">

<h2>Relatório de Veículo</h2>

<div class="top-buttons">
  <button id="btnInicial" onclick="selecionarTipo('inicial')">Km Inicial</button>
  <button id="btnFinal" onclick="selecionarTipo('final')">Km Final</button>
</div>

<input type="hidden" id="data">

<label>Placa:</label>
<select id="placa" onchange="definirVeiculo()">
  <option value="">Carregando...</option>
</select>

<label>Tipo de veículo:</label>
<input type="text" id="tipo" readonly>

<label>Motorista:</label>
<div class="linha">
  <input type="tel" id="codigo" placeholder="Cód">
  <input type="text" id="motorista" placeholder="Nome completo" readonly>
</div>

<div id="campoInicial" class="hidden">
  <label>Km Inicial:</label>
  <input type="number" id="kmInicial">
</div>

<div id="campoFinal" class="hidden">
  <label>Km Final:</label>
  <input type="number" id="kmFinal">
</div>

<button class="enviar" onclick="enviar()">Enviar</button>

</div>

<script>

let tipoSelecionado = "";
let listaCodigos = {};

// carregar txt
fetch("dados.txt")
.then(res => res.text())
.then(texto => {
  let linhas = texto.split("\n");
  let select = document.getElementById("placa");

  select.innerHTML = '<option value="">Selecione</option>';

  linhas.forEach(l => {

    if(l.includes("=")){
      let [c,n]=l.split("=");
      listaCodigos[c.trim()] = n.trim();
    }

    if(l.includes("|")){
      let [placa,tipo]=l.split("|");
      let opt=document.createElement("option");
      opt.value=placa+"|"+tipo;
      opt.textContent=placa+" - "+tipo;
      select.appendChild(opt);
    }

  });
});

// motorista automático
document.getElementById("codigo").addEventListener("input", function(){
  document.getElementById("motorista").value = listaCodigos[this.value] || "";
});

// data
window.onload = function(){
  let d = new Date();
  let data = d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,'0')+"-"+String(d.getDate()).padStart(2,'0');
  document.getElementById("data").value = data;
};

// botão
function selecionarTipo(tipo){

  tipoSelecionado = tipo;

  document.getElementById("btnInicial").classList.remove("active");
  document.getElementById("btnFinal").classList.remove("active");

  document.getElementById("campoInicial").classList.add("hidden");
  document.getElementById("campoFinal").classList.add("hidden");

  if(tipo==="inicial"){
    document.getElementById("btnInicial").classList.add("active");
    document.getElementById("campoInicial").classList.remove("hidden");
  } else {
    document.getElementById("btnFinal").classList.add("active");
    document.getElementById("campoFinal").classList.remove("hidden");
  }
}

// veículo
function definirVeiculo(){
  let v=document.getElementById("placa").value;
  if(!v) return;
  document.getElementById("tipo").value = v.split("|")[1];
}

// envio
function enviar(){

  let placaValor = document.getElementById("placa").value;
  let motorista = document.getElementById("motorista").value.trim();
  let codigo = document.getElementById("codigo").value.trim();
  let data = document.getElementById("data").value;
  let tipo = document.getElementById("tipo").value;

  if (!placaValor || !motorista || !listaCodigos[codigo]) {
    alert("Use um código válido!");
    return;
  }

  let placa = placaValor.split("|")[0];

  let partes = data.split("-");
  let dataFormatada = partes[2] + "/" + partes[1] + "/" + partes[0];

  let km = tipoSelecionado === "inicial"
    ? document.getElementById("kmInicial").value
    : document.getElementById("kmFinal").value;

  if (!km) {
    alert("Informe o KM");
    return;
  }

  // GOOGLE PLANILHAS (SEU ORIGINAL)
  let formURL = "https://docs.google.com/forms/d/e/1FAIpQLSeix5MZnyLhcfKGGPZ9tDorq0it3lHgCtqWjStNQk8P7T-L3g/formResponse?";
  formURL += "entry.539990906=" + data;
  formURL += "&entry.1842617813=" + encodeURIComponent(motorista);
  formURL += "&entry.1659496168=" + placa;
  formURL += "&entry.246432408=" + tipo;
  formURL += "&entry.911419409=" + km;
  formURL += "&entry.1663942632=" + (tipoSelecionado === "inicial" ? "Inicial" : "Final");

  fetch(formURL, {method: "POST", mode: "no-cors"});

  // WHATSAPP
  let tipoKm = tipoSelecionado === "inicial" ? "KM INICIAL" : "KM FINAL";

  let mensagem = `🚧RELATÓRIO DE KM
Data: ${dataFormatada}
Motorista: ${motorista}
Placa: ${placa}
Tipo: ${tipo}

${tipoKm}
Km: ${km}`;

  window.open("https://wa.me/?text=" + encodeURIComponent(mensagem), "_blank");
}

</script>

</body>
</html>
