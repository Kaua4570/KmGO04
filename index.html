<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Relatório KM</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  background: url('fundo.jpg') no-repeat center center fixed;
  background-size: cover;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
}

/* MENU */
.menu {
  position: fixed;
  top: 10px;
  right: 15px;
  z-index: 999;
}
.menu-btn {
  font-size: 26px;
  cursor: pointer;
}
.menu-dropdown {
  background: #111;
  border-radius: 10px;
  overflow: hidden;
}
.menu-dropdown div {
  padding: 12px 20px;
  border-bottom: 1px solid #222;
}
.menu-dropdown div:hover {
  background: #ff003c;
}

/* CARD */
.container {
  width: 90%;
  max-width: 400px;
  margin: 80px auto;
  padding: 20px;
  border-radius: 20px;
  background: rgba(20,20,20,0.6);
}

/* INPUTS */
input, select {
  width: 92%;
  margin: auto;
  display: block;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 10px;
  border: none;
}

/* BOTÕES */
button {
  width: 92%;
  margin: auto;
  display: block;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #ff003c;
  color: white;
  font-weight: bold;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<!-- MENU -->
<div class="menu">
  <div class="menu-btn" onclick="toggleMenu()">⋮</div>
  <div id="menuDropdown" class="menu-dropdown hidden">
    <div onclick="abrirGanhos()">Ganhos</div>
  </div>
</div>

<!-- TELA PRINCIPAL -->
<div class="container">

<h2>Relatório</h2>

<select id="placa" onchange="definirVeiculo()">
  <option value="">Carregando...</option>
</select>

<input id="tipo" placeholder="Tipo do veículo" readonly>

<input id="codigo" placeholder="Código do motorista">
<input id="motorista" placeholder="Motorista" readonly>

<label>Rotas:</label>
<input type="number" id="qtdRotas" value="1">

<label>KM Inicial:</label>
<input type="number" id="kmInicial">

<label>KM Final:</label>
<input type="number" id="kmFinal">

<button onclick="enviar()">Salvar</button>

</div>

<!-- TELA GANHOS -->
<div id="telaGanhos" class="hidden" style="padding:20px;">
  <h2>Seus Ganhos</h2>
  <div id="listaGanhos"></div>
  <h3 id="totalGanhos"></h3>
  <button onclick="fecharGanhos()">Voltar</button>
</div>

<script>

let listaCodigos = {};

// CARREGAR DADOS
fetch("dados.txt")
.then(r => r.text())
.then(t => {
  let linhas = t.split("\n");
  let select = document.getElementById("placa");

  select.innerHTML = '<option value="">Selecione</option>';

  linhas.forEach(l => {
    l = l.trim();
    if (!l) return;

    if (l.includes("|")) {
      let [placa, tipo] = l.split("|");

      let o = document.createElement("option");
      o.value = placa + "|" + tipo;
      o.textContent = placa + " - " + tipo;

      select.appendChild(o);
    }

    if (l.includes("=")) {
      let [c, n] = l.split("=");
      listaCodigos[c.trim()] = n.trim();
    }
  });
});

// MOTORISTA AUTOMÁTICO
document.getElementById("codigo").addEventListener("input", function() {
  document.getElementById("motorista").value = listaCodigos[this.value] || "";
});

// DEFINIR VEÍCULO
function definirVeiculo() {
  let valor = document.getElementById("placa").value;
  if (!valor) return;

  let partes = valor.split("|");
  document.getElementById("tipo").value = partes[1];
}

// CALCULAR VALOR
function calcularValor(tipo, qtd) {
  let tabela = {
    "Fiorino": 130,
    "Van Diesel": 170,
    "Eletronico": 190
  };
  return (tabela[tipo] || 0) * qtd;
}

// SALVAR
function enviar() {

  let tipo = document.getElementById("tipo").value;
  let qtd = document.getElementById("qtdRotas").value || 1;
  let motorista = document.getElementById("motorista").value;

  if (!motorista) {
    alert("Informe um código válido!");
    return;
  }

  let valor = calcularValor(tipo, qtd);

  let historico = JSON.parse(localStorage.getItem("rotas")) || [];

  historico.push({
    data: new Date().toLocaleDateString(),
    motorista: motorista,
    tipo: tipo,
    valor: valor
  });

  localStorage.setItem("rotas", JSON.stringify(historico));

  alert("Salvo com sucesso!");
}

// MENU
function toggleMenu() {
  document.getElementById("menuDropdown").classList.toggle("hidden");
}

// ABRIR GANHOS
function abrirGanhos() {

  document.querySelector(".container").style.display = "none";
  document.getElementById("telaGanhos").classList.remove("hidden");

  let nome = document.getElementById("motorista").value;
  let dados = JSON.parse(localStorage.getItem("rotas")) || [];

  let total = 0;
  let lista = "";

  dados.forEach(d => {
    if (d.motorista === nome) {
      total += d.valor;
      lista += `
        <div style="margin-bottom:10px; border-bottom:1px solid #333;">
          📅 ${d.data}<br>
          🚚 ${d.tipo}<br>
          💰 R$ ${d.valor}
        </div>`;
    }
  });

  document.getElementById("listaGanhos").innerHTML = lista;
  document.getElementById("totalGanhos").innerText = "Total: R$ " + total;
}

// FECHAR GANHOS
function fecharGanhos() {
  document.querySelector(".container").style.display = "block";
  document.getElementById("telaGanhos").classList.add("hidden");
}

</script>

</body>
</html>
