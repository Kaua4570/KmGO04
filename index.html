<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Relatório KM</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  background: url('fundo.jpg') center/cover no-repeat fixed;
}

/* OVERLAY */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
}

/* MENU */
.menu {
  position: fixed;
  top: 10px;
  right: 15px;
  z-index: 999;
}
.menu-btn {
  font-size: 26px;
  cursor: pointer;
}
.menu-dropdown {
  background: #111;
  border-radius: 10px;
  overflow: hidden;
}
.menu-dropdown div {
  padding: 12px;
}
.menu-dropdown div:hover {
  background: #ff003c;
}

/* CARD */
.container {
  width: 90%;
  max-width: 400px;
  margin: 80px auto;
  padding: 20px;
  border-radius: 20px;
  background: rgba(20,20,20,0.9);
  backdrop-filter: blur(10px);
  position: relative;
  z-index: 1;
}

h2 {
  margin-bottom: 15px;
}

/* INPUTS */
input, select {
  width: 100%;
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 12px;
  border: 1px solid #333;
  background: #1a1a1a;
  color: white;
  box-sizing: border-box;
}

input::placeholder {
  color: #aaa;
}

/* LABEL */
label {
  color: #ccc;
  font-size: 14px;
}

/* BOTÃO */
button {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #ff003c, #b3002a);
  color: white;
  font-weight: bold;
  margin-top: 10px;
}

.hidden {
  display: none;
}

/* TELA GANHOS */
#telaGanhos {
  padding: 20px;
}
</style>
</head>

<body>

<!-- MENU -->
<div class="menu">
  <div class="menu-btn" onclick="toggleMenu()">⋮</div>
  <div id="menuDropdown" class="menu-dropdown hidden">
    <div onclick="abrirGanhos()">Ganhos</div>
  </div>
</div>

<!-- TELA PRINCIPAL -->
<div class="container">

<h2>Relatório</h2>

<label>Placa</label>
<select id="placa" onchange="definirVeiculo()">
  <option value="">Selecione</option>
</select>

<label>Tipo do veículo</label>
<input id="tipo" readonly>

<label>Código do motorista</label>
<input id="codigo">

<label>Motorista</label>
<input id="motorista" readonly>

<label>Rotas</label>
<input type="number" id="qtdRotas" value="1">

<label>KM Inicial</label>
<input type="number" id="kmInicial">

<label>KM Final</label>
<input type="number" id="kmFinal">

<button onclick="enviar()">Salvar</button>

</div>

<!-- TELA GANHOS -->
<div id="telaGanhos" class="hidden">
  <h2>Ganhos</h2>
  <div id="listaGanhos"></div>
  <h3 id="totalGanhos"></h3>
  <button onclick="fecharGanhos()">Voltar</button>
</div>

<script>

let listaCodigos = {};

// CARREGAR DADOS
fetch("dados.txt")
.then(r => r.text())
.then(t => {
  let linhas = t.split("\n");
  let select = document.getElementById("placa");

  linhas.forEach(l => {
    l = l.trim();
    if (!l) return;

    if (l.includes("|")) {
      let [placa, tipo] = l.split("|");
      let o = document.createElement("option");
      o.value = placa + "|" + tipo;
      o.textContent = placa + " - " + tipo;
      select.appendChild(o);
    }

    if (l.includes("=")) {
      let [c, n] = l.split("=");
      listaCodigos[c.trim()] = n.trim();
    }
  });
});

// MOTORISTA AUTO
document.getElementById("codigo").addEventListener("input", function() {
  document.getElementById("motorista").value = listaCodigos[this.value] || "";
});

// VEÍCULO
function definirVeiculo() {
  let valor = document.getElementById("placa").value;
  if (!valor) return;

  let partes = valor.split("|");
  document.getElementById("tipo").value = partes[1];
}

// CALCULO
function calcularValor(tipo, qtd) {
  let tabela = {
    "Fiorino": 130,
    "Van Diesel": 170,
    "Eletronico": 190
  };
  return (tabela[tipo] || 0) * qtd;
}

// SALVAR
function enviar() {

  let tipo = document.getElementById("tipo").value;
  let qtd = document.getElementById("qtdRotas").value || 1;
  let motorista = document.getElementById("motorista").value;

  if (!motorista) {
    alert("Digite um código válido");
    return;
  }

  let valor = calcularValor(tipo, qtd);

  let historico = JSON.parse(localStorage.getItem("rotas")) || [];

  historico.push({
    data: new Date().toLocaleDateString(),
    motorista,
    tipo,
    valor
  });

  localStorage.setItem("rotas", JSON.stringify(historico));

  alert("Salvo!");
}

// MENU
function toggleMenu() {
  document.getElementById("menuDropdown").classList.toggle("hidden");
}

// GANHOS
function abrirGanhos() {

  document.querySelector(".container").style.display = "none";
  document.getElementById("telaGanhos").classList.remove("hidden");

  let nome = document.getElementById("motorista").value;
  let dados = JSON.parse(localStorage.getItem("rotas")) || [];

  let total = 0;
  let lista = "";

  dados.forEach(d => {
    if (d.motorista === nome) {
      total += d.valor;
      lista += `
        <div style="margin-bottom:10px; border-bottom:1px solid #333;">
          📅 ${d.data}<br>
          🚚 ${d.tipo}<br>
          💰 R$ ${d.valor}
        </div>`;
    }
  });

  document.getElementById("listaGanhos").innerHTML = lista;
  document.getElementById("totalGanhos").innerText = "Total: R$ " + total;
}

function fecharGanhos() {
  document.querySelector(".container").style.display = "block";
  document.getElementById("telaGanhos").classList.add("hidden");
}

</script>

</body>
</html>
