<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Relatório KM</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #0d0d0d;
  color: white;
}

/* TOPO COM IMAGEM */
.banner {
  width: 100%;
  height: 260px;
  background: url('fundo.jpg') no-repeat center;
  background-size: cover;
  position: relative;
}

/* ESCURECER IMAGEM */
.banner::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, rgba(0,0,0,0.4), #0d0d0d);
}

/* LOGO */
.logo-topo {
  position: absolute;
  width: 120px;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
}

/* CONTAINER SOBE POR CIMA */
.container {
  width: 92%;
  max-width: 420px;
  margin: -80px auto 20px; /* ESSA LINHA FAZ O EFEITO */
  padding: 20px;
  border-radius: 20px;

  background: rgba(15,15,15,0.95);
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

/* TÍTULO */
h2 {
  text-align: center;
  margin-bottom: 15px;
}

/* LABEL */
label {
  font-size: 12px;
  color: #aaa;
}

/* INPUTS */
input, select {
  width: 100%;
  padding: 14px;
  margin: 6px 0 15px;
  border-radius: 12px;
  border: 1px solid #333;
  background: #000;
  color: white;
}

/* FOCO */
input:focus, select:focus {
  border: 1px solid #ff003c;
  box-shadow: 0 0 10px #ff003c55;
}

/* MOTORISTA */
.linha {
  display: flex;
  gap: 8px;
}

.linha input:first-child {
  width: 80px;
}

/* BOTÕES KM */
.top-buttons {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}

.top-buttons button {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #222;
  color: #aaa;
}

/* ATIVO */
.top-buttons button.active {
  background: #ff003c;
  color: white;
  box-shadow: 0 0 10px #ff003c88;
}

/* BOTÃO ENVIAR */
button.enviar {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, #ff003c, #b3002a);
  border: none;
  border-radius: 12px;
  font-weight: bold;
  font-size: 16px;
  color: white;
}

/* ESCONDIDO */
.hidden {
  display: none;
}
</style>
</head>

<body>

<!-- IMAGEM TOPO -->
<div class="banner">
  <img src="logo.png" class="logo-topo">
</div>

<!-- CONTEÚDO -->
<div class="container">

<h2>Relatório KM</h2>

<div class="top-buttons">
  <button onclick="selecionarTipo('inicial')">Km Inicial</button>
  <button onclick="selecionarTipo('final')">Km Final</button>
</div>

<input type="hidden" id="data">

<label>Placa:</label>
<select id="placa" onchange="definirVeiculo()">
  <option value="">Carregando...</option>
</select>

<label>Tipo de veículo:</label>
<input type="text" id="tipo" readonly>

<label>Motorista:</label>
<div class="linha">
  <input type="tel" id="codigo" placeholder="Cód" maxlength="3">
  <input type="text" id="motorista" placeholder="Nome completo" readonly>
</div>

<div id="campoInicial" class="hidden">
  <label>Km Inicial:</label>
  <input type="number" id="kmInicial">
</div>

<div id="campoFinal" class="hidden">
  <label>Km Final:</label>
  <input type="number" id="kmFinal">
</div>

<button class="enviar" onclick="enviar()">Enviar</button>

</div>

<script>

// (MESMO JS QUE VOCÊ JÁ TEM — NÃO MUDEI NADA)

let tipoSelecionado = "";
let listaCodigos = {};

fetch("dados.txt")
  .then(res => res.text())
  .then(texto => {
    let linhas = texto.split("\n");
    let select = document.getElementById("placa");

    select.innerHTML = '<option value="">Selecione</option>';

    linhas.forEach(linha => {
      linha = linha.trim();
      if (!linha || linha.startsWith("#")) return;

      if (linha.includes("=")) {
        let [codigo, nome] = linha.split("=");
        listaCodigos[codigo.trim()] = nome.trim();
      }

      if (linha.includes("|")) {
        let [placa, tipo] = linha.split("|");
        let option = document.createElement("option");
        option.value = placa.trim() + "|" + tipo.trim();
        option.textContent = placa.trim() + " - " + tipo.trim();
        select.appendChild(option);
      }
    });
  });

document.getElementById("codigo").addEventListener("input", function() {
  let cod = this.value.trim();
  document.getElementById("motorista").value = listaCodigos[cod] || "";
});

window.onload = function() {
  let hoje = new Date();
  document.getElementById("data").value =
    hoje.getFullYear() + "-" +
    String(hoje.getMonth()+1).padStart(2,'0') + "-" +
    String(hoje.getDate()).padStart(2,'0');
}

function definirVeiculo() {
  let valor = document.getElementById("placa").value;
  if (!valor) return;
  document.getElementById("tipo").value = valor.split("|")[1];
}

function selecionarTipo(tipo) {
  tipoSelecionado = tipo;

  document.getElementById("campoInicial").classList.add("hidden");
  document.getElementById("campoFinal").classList.add("hidden");

  document.querySelectorAll(".top-buttons button").forEach(btn => {
    btn.classList.remove("active");
  });

  if (tipo === "inicial") {
    document.getElementById("campoInicial").classList.remove("hidden");
    document.querySelectorAll(".top-buttons button")[0].classList.add("active");
  } else {
    document.getElementById("campoFinal").classList.remove("hidden");
    document.querySelectorAll(".top-buttons button")[1].classList.add("active");
  }
}

function enviar() {
  alert("Funcionando 🔥");
}

</script>

</body>
</html>
