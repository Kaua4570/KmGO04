<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .glass-input {
        background: rgba(53, 53, 53, 0.4);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(95, 62, 62, 0.15);
      }
      .kinetic-shadow {
        box-shadow: 0 24px 48px -12px rgba(0, 0, 0, 0.5);
      }
      body {
        min-height: max(884px, 100dvh);
      }
      .active-toggle {
        background-color: #B80000 !important;
        color: #ffb3b2 !important;
      }
    
      @keyframes truck-move {
        0% { left: 0%; opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { left: 100%; opacity: 0; }
      }
      .animate-truck-move {
        animation: truck-move 6s infinite linear;
      }
      .circular-progress {
        --percent: 0;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: radial-gradient(closest-side, #131313 79%, transparent 80% 100%),
                    conic-gradient(#ffb3b2 calc(var(--percent) * 1%), #2a2a2a 0);

<body class="bg-surface text-on-surface font-body selection:bg-primary/30 min-h-screen pb-20">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#131313]/60 backdrop-blur-xl flex justify-between items-center px-6 h-16">
<div class="flex flex-col justify-center h-full w-full relative">
<div class="flex justify-between items-center w-full z-10">
<h1 class="text-xl font-black text-[#ff525c] tracking-tighter font-headline uppercase">MURICI</h1>
<!-- User Icon Placeholder (Matching Reference Image Circle Area) -->
<div class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center border border-white/5">
<span class="material-symbols-outlined text-outline">person</span>
</div>
</div>
<!-- Truck Animation Track -->
<div class="absolute bottom-1 left-0 right-0 h-4 opacity-40 pointer-events-none px-6">
<div class="flex items-center justify-between h-full w-full">
<span class="material-symbols-outlined text-[10px] text-primary">warehouse</span>
<div class="flex-1 h-[1px] bg-primary/20 relative mx-1">
<span class="material-symbols-outlined text-[10px] text-primary absolute top-1/2 -translate-y-1/2 animate-truck-move">local_shipping</span>
</div>
<span class="material-symbols-outlined text-[10px] text-primary">warehouse</span>
</div>
</div>
</div>
</header>
<main class="pt-24 px-6 max-w-2xl mx-auto">
<!-- Hero Section -->
<section class="mb-10">
<span class="text-primary font-headline font-bold tracking-widest uppercase text-xs mb-2 block">SGO4</span>
<h2 class="text-4xl font-headline font-extrabold tracking-tight text-on-surface mb-2">Relatório de km</h2>
<p class="text-outline font-body text-sm max-w-md">Provérbios 16:3.</p>
</section>
<!-- Reporting Form -->
<div class="space-y-8">
<!-- Hidden Data Field -->
<input id="data-interna" type="hidden"/>
<!-- Toggle Group: Km Inicial vs Km Final -->
<div class="bg-surface-container-low p-1.5 rounded-xl flex items-center gap-1">
<button class="flex-1 py-3 px-4 rounded-lg font-headline font-bold text-sm transition-all duration-200 text-outline hover:text-on-surface" id="btn-inicial" onclick="selecionarTipo('inicial')">
                Km Inicial
            </button>
<button class="flex-1 py-3 px-4 rounded-lg font-headline font-bold text-sm transition-all duration-200 text-outline hover:text-on-surface" id="btn-final" onclick="selecionarTipo('final')">
                Km Final
            </button>
</div>
<!-- Bento Form Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- License Plate Select -->
<div class="space-y-2 group">
<label class="block text-[10px] font-bold uppercase tracking-widest text-outline ml-1">Fio,van,elet</label>
<div class="relative">
<select class="w-full h-14 glass-input rounded-xl px-4 text-on-surface focus:ring-0 focus:border-primary transition-all appearance-none font-medium" id="placa" onchange="definirVeiculo()">
<option value="">Loading...</option>
</select>
<div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-outline">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
<!-- Vehicle Type Auto-filled -->
<div class="space-y-2">
<label class="block text-[10px] font-bold uppercase tracking-widest text-outline ml-1">Modelo</label>
<input class="w-full h-14 bg-surface-container/50 border border-outline-variant/10 rounded-xl px-4 flex items-center text-on-surface/60 font-medium focus:ring-0 focus:outline-none" id="tipo" placeholder="..." readonly="" type="text"/>
</div>
<!-- Driver Code -->
<div class="space-y-2">
<label class="block text-[10px] font-bold uppercase tracking-widest text-outline ml-1">Driver</label>
<div class="relative">
<input class="w-full h-14 glass-input rounded-xl px-4 text-on-surface placeholder:text-outline/30 focus:ring-0 focus:border-primary transition-all font-mono" id="codigo" maxlength="3" placeholder="000" type="tel"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2 text-[10px] font-bold text-outline uppercase bg-surface-container-highest px-2 py-1 rounded" id="status-motorista">
                        Código
                    </div>
</div>
</div>
<!-- Hidden Driver Name Display -->
<input id="motorista" type="hidden"/>
<!-- Mileage Input -->
<div class="space-y-2">
<label class="block text-[10px] font-bold uppercase tracking-widest text-outline ml-1">insira o KM</label>
<div class="relative">
<input class="w-full h-14 glass-input rounded-xl px-4 text-on-surface placeholder:text-outline/30 focus:ring-0 focus:border-primary transition-all font-headline font-extrabold text-lg" id="km-input" placeholder="000.000" type="number"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2 text-outline font-bold text-xs uppercase">
                        KM
                    </div>
</div>
</div>
</div>
<!-- Map Card -->
<div class="w-full h-48 rounded-xl overflow-hidden relative group border border-outline-variant/10 kinetic-shadow">
<img class="w-full h-full object-cover filter grayscale" src="https://lh3.googleusercontent.com/aida/ADBb0uhI-LT7yVxtpCimdLK7kuCXcbpFQyFiIao0Q10435MmOIJ6byfk2N6J-b--rxfnTACUtivf_xEezkIAnfbYrGTZXmtbeGuu9AiPlYE0EhLqTDZhRNMBQUWftD8bOe4aEr3clcgN45L0NTUrrEU91OdjUqls31uugf6fiShS4G-SzBfKM01JpzdroKQjjg17oiTIURVOgugBxx6NDN747Yqo8qymf0kb7hdczUwY1JHfFGoNJYF1ctiy1YAFhtlGs2X-MmTIQcGzPx8"/>
<div class="absolute inset-0 bg-gradient-to-t from-surface to-transparent opacity-60"></div>
<div class="absolute bottom-4 left-4 right-4 flex justify-between items-end backdrop-blur-md bg-surface-variant/40 p-4 rounded-lg border border-white/5">
<div>
<p class="text-[10px] font-bold text-primary uppercase tracking-tighter">Current Gateway</p>
<h4 class="text-on-surface font-headline font-bold">Anápolis-GO</h4>
</div>
<div class="text-right">
<p class="text-[10px] font-medium text-outline font-mono">-23.5505, -46.6333</p>
<div class="flex items-center gap-1.5 justify-end mt-1">
<span class="w-2 h-2 rounded-full bg-primary animate-pulse"></span>
<span class="text-[10px] font-bold text-on-surface uppercase tracking-widest">Active Sync</span>
</div>
</div>
</div>
</div>
<!-- Submit Button -->
<button class="w-full h-16 rounded-xl bg-gradient-to-r from-primary to-primary-container text-on-primary-container font-headline font-extrabold text-lg tracking-widest uppercase flex items-center justify-center gap-3 kinetic-shadow active:scale-[0.98] transition-all group" onclick="enviar()">
            Confirmar o envio 
            <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">send</span>
</button>
</div>
<!-- Stats & Information Section (Moved from header) -->
<div class="mt-12 space-y-4">
<div class="grid grid-cols-2 gap-4">
<!-- Cumulative Earnings Card -->
<div class="bg-surface-container-low p-4 rounded-xl border border-white/5 flex flex-col justify-between h-24">
<span class="text-[9px] font-bold text-outline uppercase tracking-wider">Ganhos Acumulados</span>
<span class="text-2xl font-black text-primary font-headline" id="ganhos-acumulados">R$ 0,00</span>
</div>
<!-- Fortnight Progress Card -->
<div class="bg-surface-container-low p-4 rounded-xl border border-white/5 flex items-center justify-between h-24">
<div class="flex flex-col">
<span class="text-[9px] font-bold text-outline uppercase tracking-wider">Quinzena</span>
<span class="text-2xl font-black text-on-surface font-headline" id="progress-text">0%</span>
</div>
<div class="circular-progress scale-150 mr-2" id="progress-circle" style="--percent: 45;"></div>
</div>
</div>
<!-- System Message -->
<div class="p-6 rounded-xl border border-outline-variant/10 bg-surface-container-low flex gap-4 items-start">
<span class="material-symbols-outlined text-tertiary">info</span>
<div>
<h5 class="text-sm font-bold text-on-surface mb-1">Audit Protocol Active</h5>
<p class="text-xs text-outline leading-relaxed">uma ótima rota⚡.</p>
</div>
</div>
</div>
</main>
<script>
    let tipoSelecionado = "";
    let listaCodigos = {};
    let totalGanhos = 0;

    const VALORES_VEICULO = {
        "Fiorino": 130,
        "Van Diesel": 170,
        "Eletrônico": 190
    };

    // Calculate Fortnight Progress
    function updateFortnightProgress() {
        const now = new Date();
        const day = now.getDate();
        const month = now.getMonth();
        const year = now.getFullYear();
        
        let start, end;
        
        if (day >= 15) {
            // Period: 15th to last day of current month
            start = new Date(year, month, 15);
            end = new Date(year, month + 1, 0); // Last day of month
        } else {
            // Period: Last day of previous month to 14th of current month
            start = new Date(year, month - 1, 0);
            end = new Date(year, month, 14);
        }

        const total = end - start;
        const current = now - start;
        let percent = Math.round((current / total) * 100);
        percent = Math.max(0, Math.min(100, percent));

        const circle = document.getElementById('progress-circle');
        const text = document.getElementById('progress-text');
        
        if(circle) circle.style.setProperty('--percent', percent);
        if(text) text.textContent = percent + '%';
    }

    // Update Earnings Display
    function atualizarGanhos() {
        const display = document.getElementById('ganhos-acumulados');
        display.textContent = `R$ ${totalGanhos.toFixed(2).replace('.', ',')}`;
    }

    // CARREGAR TXT
    fetch("dados.txt")
        .then(res => res.text())
        .then(texto => {
            let linhas = texto.split("\n");
            let select = document.getElementById("placa");
            select.innerHTML = '<option value="">Selecionar Placa</option>';

            linhas.forEach(linha => {
                linha = linha.trim();
                if (!linha || linha.startsWith("#")) return;

                if (linha.includes("=")) {
                    let [codigo, nome] = linha.split("=");
                    listaCodigos[codigo.trim()] = nome.trim();
                }

                if (linha.includes("|")) {
                    let [placa, tipo] = linha.split("|");
                    let option = document.createElement("option");
                    option.value = placa.trim() + "|" + tipo.trim();
                    option.textContent = placa.trim();
                    select.appendChild(option);
                }
            });
        })
        .catch(err => {
            console.error("Error loading data:", err);
            document.getElementById("placa").innerHTML = '<option value="">Error loading</option>';
        });

    // AUTO PREENCHER MOTORISTA
    document.getElementById("codigo").addEventListener("input", function() {
        let cod = this.value.trim();
        let nome = listaCodigos[cod];
        let statusDiv = document.getElementById("status-motorista");
        let motoristaInput = document.getElementById("motorista");

        if (nome) {
            motoristaInput.value = nome;
            statusDiv.textContent = "Verified: " + nome;
            statusDiv.classList.remove("text-outline", "bg-surface-container-highest");
            statusDiv.classList.add("text-tertiary", "bg-tertiary/10");
        } else {
            motoristaInput.value = "";
            statusDiv.textContent = "Waiting Code";
            statusDiv.classList.add("text-outline", "bg-surface-container-highest");
            statusDiv.classList.remove("text-tertiary", "bg-tertiary/10");
        }
    });

    // DATA
    window.onload = function() {
        let hoje = new Date();
        let ano = hoje.getFullYear();
        let mes = String(hoje.getMonth() + 1).padStart(2, '0');
        let dia = String(hoje.getDate()).padStart(2, '0');
        document.getElementById("data-interna").value = `${ano}-${mes}-${dia}`;
        
        updateFortnightProgress();
        selecionarTipo('inicial');
        atualizarGanhos();
    };

    // VEÍCULO
    function definirVeiculo() {
        let valor = document.getElementById("placa").value;
        let tipoInput = document.getElementById("tipo");
        if (!valor) {
            tipoInput.value = "";
            return;
        }
        let partes = valor.split("|");
        tipoInput.value = partes[1];
    }

    // BOTÕES
    function selecionarTipo(tipo) {
        tipoSelecionado = tipo;
        const btnIncial = document.getElementById("btn-inicial");
        const btnFinal = document.getElementById("btn-final");

        btnIncial.classList.remove("active-toggle");
        btnFinal.classList.remove("active-toggle");

        if (tipo === "inicial") {
            btnIncial.classList.add("active-toggle");
        } else {
            btnFinal.classList.add("active-toggle");
        }
    }

    // ENVIO
    function enviar() {
        let placaValor = document.getElementById("placa").value;
        let motorista = document.getElementById("motorista").value.trim();
        let codigo = document.getElementById("codigo").value.trim();
        let data = document.getElementById("data-interna").value;
        let tipo = document.getElementById("tipo").value;
        let km = document.getElementById("km-input").value;

        if (!placaValor || !motorista || !listaCodigos[codigo]) {
            alert("Please enter a valid driver code.");
            return;
        }

        if (!km) {
            alert("Please enter current mileage.");
            return;
        }

        // Logic for earnings simulation on Confirm
        if (tipoSelecionado === "inicial") {
            let valorAcrescentado = VALORES_VEICULO[tipo] || 0;
            totalGanhos += valorAcrescentado;
            atualizarGanhos();
        }

        let placa = placaValor.split("|")[0];
        let partes = data.split("-");
        let dataFormatada = partes[2] + "/" + partes[1] + "/" + partes[0];

        let formURL = "https://docs.google.com/forms/d/e/1FAIpQLSeix5MZnyLhcfKGGPZ9tDorq0it3lHgCtqWjStNQk8P7T-L3g/formResponse?";
        formURL += "entry.539990906=" + data;
        formURL += "&entry.1842617813=" + encodeURIComponent(motorista);
        formURL += "&entry.1659496168=" + placa;
        formURL += "&entry.246432408=" + tipo;
        formURL += "&entry.911419409=" + km;
        formURL += "&entry.1663942632=" + (tipoSelecionado === "inicial" ? "Inicial" : "Final");

        fetch(formURL, {method: "POST", mode: "no-cors"});

        let mensagem = `🚧RELATÓRIO DE KM\nData: ${dataFormatada}\nMotorista: ${motorista}\nPlaca: ${placa}\nTipo: ${tipo}\n\nKM ${tipoSelecionado.toUpperCase()}\nKm: ${km}`;
        window.open("https://wa.me/?text=" + encodeURIComponent(mensagem), "_blank");
    }
</script>
</body></html>
