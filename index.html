<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Relatório KM</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#b00d02">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  background: url('fundo.jpg') no-repeat center center fixed;
  background-size: cover;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
}

/* MENU */
.menu {
  position: fixed;
  top: 10px;
  right: 15px;
  z-index: 999;
}
.menu-btn {
  font-size: 26px;
  cursor: pointer;
}
.menu-dropdown {
  background: #111;
  border-radius: 10px;
  overflow: hidden;
}
.menu-dropdown div {
  padding: 12px;
}
.menu-dropdown div:hover {
  background: #ff003c;
}

/* TOPO */
.topo { height: 60px; }

/* CARD */
.container {
  width: 90%;
  max-width: 400px;
  margin: 20px auto;
  padding: 25px 10px;
  border-radius: 20px;
  background: rgba(20,20,20,0.6);
  backdrop-filter: blur(15px);
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 0 20px rgba(255,0,60,0.15);
  position: relative;
  z-index: 2;
}

/* BOTÕES */
.top-buttons {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}

.top-buttons button {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #111;
  color: #aaa;
  transition: 0.3s;
}

.top-buttons button.active {
  background: linear-gradient(135deg, #ff003c, #ff4d6d);
  color: white;
  box-shadow: 0 0 10px #ff003c;
}

/* INPUTS */
input, select {
  width: 92%;
  padding: 14px;
  margin: 6px auto 15px;
  border-radius: 12px;
  border: 1px solid #333;
  background: rgba(0,0,0,0.6);
  color: white;
  display: block;
}

.linha {
  display: flex;
  gap: 8px;
  width: 92%;
  margin: auto;
}

.linha input:first-child {
  width: 80px;
}

/* BOTÃO */
button.enviar {
  width: 92%;
  margin: auto;
  display: block;
  padding: 16px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #ff003c, #b3002a);
  color: white;
  font-weight: bold;
}

.hidden { display: none; }

/* GANHOS */
#telaGanhos {
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 1000;
  padding: 20px;
  overflow-y: auto;
}
</style>
</head>

<body>

<div class="topo"></div>

<!-- MENU -->
<div class="menu">
  <div class="menu-btn" onclick="toggleMenu()">⋮</div>
  <div id="menuDropdown" class="menu-dropdown hidden">
    <div onclick="abrirGanhos()">Ganhos</div>
  </div>
</div>

<div class="container">

<h2>Relatório de Veículo</h2>

<div class="top-buttons">
  <button id="btnInicial" class="active" onclick="selecionarTipo('inicial')">Km Inicial</button>
  <button id="btnFinal" onclick="selecionarTipo('final')">Km Final</button>
</div>

<label>Placa:</label>
<select id="placa" onchange="definirVeiculo()">
  <option value="">Selecione</option>
</select>

<label>Tipo de veículo:</label>
<input type="text" id="tipo" readonly>

<label>Motorista:</label>
<div class="linha">
  <input type="tel" id="codigo" placeholder="Cód">
  <input type="text" id="motorista" placeholder="Nome completo" readonly>
</div>

<div id="campoInicial">
  <label>Km Inicial:</label>
  <input type="number" id="kmInicial">
</div>

<div id="campoFinal" class="hidden">
  <label>Km Final:</label>
  <input type="number" id="kmFinal">
</div>

<button class="enviar" onclick="enviar(); salvarGanho();">Enviar</button>

</div>

<!-- GANHOS -->
<div id="telaGanhos" class="hidden">
  <h2>Seus Ganhos</h2>
  <div id="listaGanhos"></div>
  <h3 id="totalGanhos"></h3>
  <button onclick="fecharGanhos()">Voltar</button>
</div>

<script>

let tipoSelecionado = "inicial";
let listaCodigos = {};

// carregar dados
fetch("dados.txt")
.then(res => res.text())
.then(texto => {
  let linhas = texto.split("\n");
  let select = document.getElementById("placa");

  linhas.forEach(l => {

    if(l.includes("=")){
      let [c,n]=l.split("=");
      listaCodigos[c.trim()] = n.trim();
    }

    if(l.includes("|")){
      let [placa,tipo]=l.split("|");
      let opt=document.createElement("option");
      opt.value=placa+"|"+tipo;
      opt.textContent=placa+" - "+tipo;
      select.appendChild(opt);
    }

  });
});

// motorista automático
document.getElementById("codigo").addEventListener("input", function(){
  document.getElementById("motorista").value = listaCodigos[this.value] || "";
});

// seleção botão
function selecionarTipo(tipo){
  tipoSelecionado = tipo;

  document.getElementById("btnInicial").classList.remove("active");
  document.getElementById("btnFinal").classList.remove("active");

  if(tipo==="inicial"){
    document.getElementById("btnInicial").classList.add("active");
    document.getElementById("campoInicial").classList.remove("hidden");
    document.getElementById("campoFinal").classList.add("hidden");
  } else {
    document.getElementById("btnFinal").classList.add("active");
    document.getElementById("campoInicial").classList.add("hidden");
    document.getElementById("campoFinal").classList.remove("hidden");
  }
}

// definir veículo
function definirVeiculo(){
  let v=document.getElementById("placa").value;
  if(!v) return;
  document.getElementById("tipo").value = v.split("|")[1];
}

// valores
function calcularValor(tipo){
  return {
    "Fiorino":130,
    "Van Diesel":170,
    "Eletronico":190
  }[tipo] || 0;
}

// quinzena
function getQuinzena(d){
  let dia=d.getDate();
  let mes=d.getMonth()+1;
  let ano=d.getFullYear();
  return dia<=14 ? `01/${mes} até 14/${mes}/${ano}` : `15/${mes} até final/${ano}`;
}

// salvar ganho (SÓ KM INICIAL)
function salvarGanho(){

  if(tipoSelecionado !== "inicial") return;

  let tipo=document.getElementById("tipo").value;
  let motorista=document.getElementById("motorista").value;

  if(!motorista) return;

  let dados=JSON.parse(localStorage.getItem("ganhos"))||[];
  let hoje=new Date();

  dados.push({
    motorista,
    tipo,
    valor:calcularValor(tipo),
    data:hoje.toLocaleDateString(),
    quinzena:getQuinzena(hoje)
  });

  localStorage.setItem("ganhos",JSON.stringify(dados));
}

// abrir ganhos
function abrirGanhos(){

  document.getElementById("telaGanhos").classList.remove("hidden");

  let nome=document.getElementById("motorista").value;
  let dados=JSON.parse(localStorage.getItem("ganhos"))||[];

  let total=0;
  let html="";

  if(dados.length===0){
    html="<p>Nenhum ganho ainda</p>";
  }

  dados.forEach(d=>{
    if(!nome || d.motorista===nome){
      total+=d.valor;
      html+=`
      <div style="margin-bottom:10px;border-bottom:1px solid #333;">
      📅 ${d.data}<br>🚚 ${d.tipo}<br>💰 R$ ${d.valor}<br>🗓 ${d.quinzena}</div>`;
    }
  });

  document.getElementById("listaGanhos").innerHTML=html;
  document.getElementById("totalGanhos").innerText="Total: R$ "+total;
}

// menu
function toggleMenu(){
  document.getElementById("menuDropdown").classList.toggle("hidden");
}

function fecharGanhos(){
  document.getElementById("telaGanhos").classList.add("hidden");
}

// WHATSAPP
function enviar() {

  let placaValor = document.getElementById("placa").value;
  let motorista = document.getElementById("motorista").value.trim();
  let codigo = document.getElementById("codigo").value.trim();
  let data = document.getElementById("data").value;
  let tipo = document.getElementById("tipo").value;

  if (!placaValor || !motorista || !listaCodigos[codigo]) {
    alert("Use um código válido!");
    return;
  }

  let placa = placaValor.split("|")[0];

  // 📅 FORMATO DATA
  let partes = data.split("-");
  let dataFormatada = partes[2] + "/" + partes[1] + "/" + partes[0];

  let km = tipoSelecionado === "inicial"
    ? document.getElementById("kmInicial").value
    : document.getElementById("kmFinal").value;

  if (!km) {
    alert("Informe o KM");
    return;
  }

  // 🔥 ENVIO GOOGLE PLANILHAS (IGUAL O SEU)
  let formURL = "https://docs.google.com/forms/d/e/1FAIpQLSeix5MZnyLhcfKGGPZ9tDorq0it3lHgCtqWjStNQk8P7T-L3g/formResponse?";
  formURL += "entry.539990906=" + data;
  formURL += "&entry.1842617813=" + encodeURIComponent(motorista);
  formURL += "&entry.1659496168=" + placa;
  formURL += "&entry.246432408=" + tipo;
  formURL += "&entry.911419409=" + km;
  formURL += "&entry.1663942632=" + (tipoSelecionado === "inicial" ? "Inicial" : "Final");

  fetch(formURL, {method: "POST", mode: "no-cors"});

  // 🔥 WHATSAPP (FORMATO QUE VOCÊ PEDIU)
  let tipoKm = tipoSelecionado === "inicial" ? "KM INICIAL" : "KM FINAL";

  let mensagem = `🚧RELATÓRIO DE KM
Data: ${dataFormatada}
Motorista: ${motorista}
Placa: ${placa}
Tipo: ${tipo}

${tipoKm}
Km: ${km}`;

  window.open("https://wa.me/?text=" + encodeURIComponent(mensagem), "_blank");
}
</script>

</body>
</html>
