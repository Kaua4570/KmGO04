<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Relatório KM</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: radial-gradient(circle at top, #1a1a1a, #000);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

/* CARD */
.container {
  width: 95%;
  max-width: 420px;
  padding: 20px;
  border-radius: 20px;
  background: rgba(20,20,20,0.9);
  backdrop-filter: blur(10px);
  box-shadow: 0 0 40px rgba(255,0,60,0.25);
  color: white;
}

/* LOGO */
.logo {
  text-align: center;
  margin-bottom: 10px;
}

.logo img {
  width: 160px;
  border-radius: 10px;
}

/* TÍTULO */
h2 {
  text-align: center;
  margin: 10px 0 5px;
}

.sub {
  text-align: center;
  color: #aaa;
  font-size: 13px;
  margin-bottom: 15px;
}

/* LABEL */
label {
  font-size: 12px;
  color: #aaa;
}

/* INPUTS */
input, select {
  width: 100%;
  padding: 14px;
  margin: 6px 0 15px;
  border-radius: 12px;
  border: 1px solid #333;
  background: rgba(0,0,0,0.6);
  color: white;
}

/* FOCO */
input:focus, select:focus {
  border: 1px solid #ff003c;
  box-shadow: 0 0 10px #ff003c55;
}

/* MOTORISTA */
.linha {
  display: flex;
  gap: 8px;
}

.linha input:first-child {
  width: 80px;
}

/* BOTÕES KM */
.top-buttons {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}

.top-buttons button {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #222;
  color: #aaa;
}

/* ATIVO */
.top-buttons button.active {
  background: #ff003c;
  color: white;
  box-shadow: 0 0 10px #ff003c88;
}

/* BOTÃO ENVIAR */
button.enviar {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, #ff003c, #b3002a);
  border: none;
  border-radius: 12px;
  font-weight: bold;
  font-size: 16px;
  color: white;
  box-shadow: 0 0 15px #ff003c88;
}

/* ESCONDIDO */
.hidden {
  display: none;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">
  <img src="logo.png">
</div>

<h2>Relatório KM</h2>
<div class="sub">Murici Logística</div>

<div class="top-buttons">
  <button onclick="selecionarTipo('inicial')">Km Inicial</button>
  <button onclick="selecionarTipo('final')">Km Final</button>
</div>

<input type="hidden" id="data">

<label>Placa:</label>
<select id="placa" onchange="definirVeiculo()">
  <option value="">Carregando...</option>
</select>

<label>Tipo de veículo:</label>
<input type="text" id="tipo" readonly>

<label>Motorista:</label>
<div class="linha">
  <input type="tel" id="codigo" placeholder="Cód" maxlength="3">
  <input type="text" id="motorista" placeholder="Nome completo" readonly>
</div>

<div id="campoInicial" class="hidden">
  <label>Km Inicial:</label>
  <input type="number" id="kmInicial">
</div>

<div id="campoFinal" class="hidden">
  <label>Km Final:</label>
  <input type="number" id="kmFinal">
</div>

<button class="enviar" onclick="enviar()">Enviar</button>

</div>

<script>

let tipoSelecionado = "";
let listaCodigos = {};

// CARREGAR TXT
fetch("dados.txt")
  .then(res => res.text())
  .then(texto => {

    let linhas = texto.split("\n");
    let select = document.getElementById("placa");

    select.innerHTML = '<option value="">Selecione</option>';

    linhas.forEach(linha => {
      linha = linha.trim();

      if (!linha || linha.startsWith("#")) return;

      if (linha.includes("=")) {
        let [codigo, nome] = linha.split("=");
        listaCodigos[codigo.trim()] = nome.trim();
      }

      if (linha.includes("|")) {
        let [placa, tipo] = linha.split("|");

        let option = document.createElement("option");
        option.value = placa.trim() + "|" + tipo.trim();
        option.textContent = placa.trim() + " - " + tipo.trim();

        select.appendChild(option);
      }

    });

  });

// AUTO PREENCHER
document.getElementById("codigo").addEventListener("input", function() {
  let cod = this.value.trim();
  document.getElementById("motorista").value = listaCodigos[cod] || "";
});

// DATA
window.onload = function() {
  let hoje = new Date();
  document.getElementById("data").value =
    hoje.getFullYear() + "-" +
    String(hoje.getMonth()+1).padStart(2,'0') + "-" +
    String(hoje.getDate()).padStart(2,'0');
}

// VEÍCULO
function definirVeiculo() {
  let valor = document.getElementById("placa").value;
  if (!valor) return;
  document.getElementById("tipo").value = valor.split("|")[1];
}

// BOTÕES
function selecionarTipo(tipo) {
  tipoSelecionado = tipo;

  document.getElementById("campoInicial").classList.add("hidden");
  document.getElementById("campoFinal").classList.add("hidden");

  document.querySelectorAll(".top-buttons button").forEach(btn => {
    btn.classList.remove("active");
  });

  if (tipo === "inicial") {
    document.getElementById("campoInicial").classList.remove("hidden");
    document.querySelectorAll(".top-buttons button")[0].classList.add("active");
  } else {
    document.getElementById("campoFinal").classList.remove("hidden");
    document.querySelectorAll(".top-buttons button")[1].classList.add("active");
  }
}

// ENVIO
function enviar() {

  let placaValor = document.getElementById("placa").value;
  let motorista = document.getElementById("motorista").value.trim();
  let codigo = document.getElementById("codigo").value.trim();
  let data = document.getElementById("data").value;
  let tipo = document.getElementById("tipo").value;

  if (!placaValor || !motorista || !listaCodigos[codigo]) {
    alert("Use um código válido!");
    return;
  }

  let placa = placaValor.split("|")[0];

  let partes = data.split("-");
  let dataFormatada = partes[2] + "/" + partes[1] + "/" + partes[0];

  let km = tipoSelecionado === "inicial"
    ? document.getElementById("kmInicial").value
    : document.getElementById("kmFinal").value;

  if (!km) {
    alert("Informe o KM");
    return;
  }

  let formURL = "https://docs.google.com/forms/d/e/1FAIpQLSeix5MZnyLhcfKGGPZ9tDorq0it3lHgCtqWjStNQk8P7T-L3g/formResponse?";
  formURL += "entry.539990906=" + data;
  formURL += "&entry.1842617813=" + encodeURIComponent(motorista);
  formURL += "&entry.1659496168=" + placa;
  formURL += "&entry.246432408=" + tipo;
  formURL += "&entry.911419409=" + km;
  formURL += "&entry.1663942632=" + (tipoSelecionado === "inicial" ? "Inicial" : "Final");

  fetch(formURL, {method: "POST", mode: "no-cors"});

  let mensagem = `🚧RELATÓRIO DE KM\nData: ${dataFormatada}\nMotorista: ${motorista}\nPlaca: ${placa}\nTipo: ${tipo}\n\nKM ${tipoSelecionado.toUpperCase()}\nKm: ${km}`;

  window.open("https://wa.me/?text=" + encodeURIComponent(mensagem), "_blank");
}

// SERVICE WORKER
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}

</script>

</body>
</html>
