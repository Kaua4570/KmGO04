<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Relatório KM</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: #fff;
}

/* FUNDO */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('fundo.jpg') no-repeat center top;
  background-size: cover;
  opacity: 0.25;
  z-index: -1;
}

/* CONTAINER */
.container {
  padding: 20px;
}

/* CARD */
.card {
  background: rgba(0,0,0,0.8);
  border-radius: 20px;
  padding: 20px;
  margin-top: 120px;
  box-shadow: 0 0 20px rgba(255,0,0,0.3);
}

/* TITULO */
h1 {
  text-align: center;
}

/* INPUTS */
input, select {
  width: 100%;
  padding: 15px;
  margin-top: 10px;
  border-radius: 12px;
  border: 1px solid #333;
  background: #000;
  color: #fff;
}

/* BOTÃO */
button {
  width: 100%;
  padding: 15px;
  margin-top: 20px;
  border-radius: 15px;
  border: none;
  background: linear-gradient(45deg, #ff003c, #ff1f5a);
  color: #fff;
  font-size: 18px;
}

/* GRID KM */
.row {
  display: flex;
  gap: 10px;
}

.row input {
  width: 50%;
}
</style>

</head>

<body>

<div class="container">

  <div class="card">

    <h1>Relatório de Veículo</h1>

    <div class="row">
      <input type="number" id="kmInicial" placeholder="Km Inicial">
      <input type="number" id="kmFinal" placeholder="Km Final">
    </div>

    <label>Placa:</label>
    <select id="placa"></select>

    <label>Tipo de veículo:</label>
    <input type="text" id="tipo" readonly>

    <label>Motorista:</label>
    <div class="row">
      <input type="text" id="cod" placeholder="Cód">
      <input type="text" id="motorista" placeholder="Nome completo">
    </div>

    <button onclick="enviarFormulario()">Enviar</button>

  </div>

</div>

<script>
// CARREGAR DADOS
fetch("dados.txt")
.then(res => res.text())
.then(texto => {
  const linhas = texto.split("\n");
  const select = document.getElementById("placa");

  linhas.forEach(linha => {
    if (linha.includes("|")) {
      const [placa, tipo] = linha.split("|");

      const option = document.createElement("option");
      option.value = placa;
      option.textContent = placa + " - " + tipo;
      option.dataset.tipo = tipo;

      select.appendChild(option);
    }
  });

  select.addEventListener("change", () => {
    const tipo = select.options[select.selectedIndex].dataset.tipo;
    document.getElementById("tipo").value = tipo;
  });
});

// BOTÃO ENVIAR (SEM ALERT 🚀)
function enviarFormulario() {
  const placa = document.getElementById("placa").value;
  const tipo = document.getElementById("tipo").value;
  const kmInicial = document.getElementById("kmInicial").value;
  const kmFinal = document.getElementById("kmFinal").value;
  const motorista = document.getElementById("motorista").value;

  if (!placa || !kmInicial) {
    alert("Preencha os campos obrigatórios!");
    return;
  }

  const dados = {
    placa,
    tipo,
    kmInicial,
    kmFinal,
    motorista
  };

  console.log("Enviado:", dados);

  // LIMPA FORM
  document.querySelector("form")?.reset();

  // FEEDBACK NO BOTÃO
  const btn = document.querySelector("button");
  btn.innerText = "Enviado ✔";

  setTimeout(() => {
    btn.innerText = "Enviar";
  }, 2000);
}
</script>

</body>
</html>
